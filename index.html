<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Out — Flow Host</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: #032d60;
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        #lightning-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 400px;
        }
        /* Contain Lightning's fixed-position loading overlay within the container */
        #lightning-container .slds-spinner_container,
        #lightning-container .slds-modal,
        #lightning-container .slds-backdrop {
            position: absolute;
        }
        #loading-msg {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.1rem;
        }
        #error-msg {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #c23934;
            background: #fef0ef;
            border-radius: 6px;
            margin: 1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Lightning Out — Embedded Flow</h1>
</header>

<div id="lightning-container">
    <div id="loading-msg">Loading flow&hellip;</div>
    <div id="error-msg"></div>
    <div id="flowLocator"></div>
</div>

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CONFIGURATION — Update these two values before deploying   ║
  ╚══════════════════════════════════════════════════════════════╝

  SF_SITE_URL : Your Salesforce Site base URL (Experience Cloud or Sites)
                e.g. https://mydomain.my.salesforce-sites.com
                     https://mydomain.my.site.com/flowhost

  FLOW_API_NAME : API name of the Screen Flow to embed
                  e.g. Web_to_Case_with_Attachments
-->

<script>
    // ── CONFIG ──────────────────────────────────────────────
    const SF_SITE_URL  = 'https://perficient-2de-dev-ed.develop.my.salesforce-sites.com/flowhost';
    const FLOW_API_NAME = 'Test_Screen_Flow';
    // ────────────────────────────────────────────────────────
</script>

<!-- Lightning Out JS from your Salesforce Site -->
<script id="lightning-out-js"></script>

<script>
    (function () {
        var scriptEl = document.getElementById('lightning-out-js');
        scriptEl.src = SF_SITE_URL + '/lightning/lightning.out.js';

        scriptEl.onload = function () {
            document.getElementById('loading-msg').textContent = 'Connecting to Salesforce…';

            $Lightning.use(
                'c:embedFlowInExternalWebsiteApp',  // Aura app name
                function () {
                    $Lightning.createComponent(
                        'c:embedFlowInExternalWebsite',  // Aura component name
                        { flowApiName: FLOW_API_NAME },
                        'flowLocator',
                        function (cmp) {
                            if (cmp) {
                                document.getElementById('loading-msg').style.display = 'none';
                            }
                        }
                    );
                },
                SF_SITE_URL  // Salesforce Site endpoint
            );
        };

        scriptEl.onerror = function () {
            document.getElementById('loading-msg').style.display = 'none';
            var errEl = document.getElementById('error-msg');
            errEl.style.display = 'block';
            errEl.textContent = 'Failed to load lightning.out.js — check your SF_SITE_URL (' + SF_SITE_URL + ')';
        };
    })();
</script>

</body>
</html>
